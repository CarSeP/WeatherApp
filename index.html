<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="svg/cloud-sun.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Vite App</title>
</head>

<body>
  <div class="app">
    <div class="app-container">
      <div class="card">
        <div class="loader-container" id="loader">
          <div class="loader"></div>
      </div>
      
        <div class="input-container">
          <img src="svg/search.svg" class="svg" id="search">
          <input type="text" class="input" id="input">
          <img src="svg/earth.svg" class="svg" id="autoLocation">
        </div>
        <h2 id="text"></h2>
        <div id="container">
          <h1 class="card-title" id="country"></h1>
          <img src="svg/cloud-sun.svg" class="card-img">
          <h2 class="card-temp font" id="temp"></h2>
          <p class="card-text" id="description"></p>
          <div class="card-container">
            <div class="card-container">
              <img src="svg/humidity.svg" class="card-container-img">
              <div>
                <span class="bold" id="humidity"></span>
                <span class="font" id="humidity-title"></span>
              </div>
            </div>
            <div class="card-container">
              <img src="svg/wind.svg" class="card-container-img">
              <div>
                <span class="bold" id="wind"></span>
                <span class="font" id="wind-title"></span>
              </div>
            </div>
          </div>
          <div class="card-container">
            <div>
              <span class="bold">Min</span>
              <span class="font" id="tempMin"></span>
            </div>
            <div>
              <span class="bold">Max</span>
              <span class="font" id="tempMax"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>

</html>
